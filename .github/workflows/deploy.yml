name: Deploy Lovable via FTP na Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v3

      - name: Configurar Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalar dependências
        run: npm install

      - name: Verificar links internos e sitemap
        run: node scripts/check-links.mjs

      - name: Build SSG do projeto
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        run: npx vite-react-ssg build

      - name: Mostrar arquivos gerados
        run: |
          echo "=== Estrutura de diretórios ==="
          find dist -type d | head -30
          echo ""
          echo "=== Arquivos HTML gerados ==="
          find dist -name "*.html" | head -50
          echo ""
          echo "=== Conteúdo do dist/ ==="
          ls -la dist/

      - name: Deploy FTP para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          port: 21
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./dist/
          server-dir: /
          dangerous-clean-slate: true
          dry-run: false
          log-level: verbose
